spring.application.name=eharvest

spring.datasource.url=jdbc:postgresql://db:5432/eharvest?sslmode=disable
#spring.datasource.url=jdbc:postgresql://localhost:5432/eharvest
spring.datasource.username=postgres
spring.datasource.password=password

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# application.properties
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

# External AI API key (Keep this secure in production)
ai.api.key=eharvest-ai-secret-key-12345
trust-score.api.base-url=http://34.206.207.121:8000

# File storage
storage.base-dir=uploads

# Paynow
paynow.integration.id=24589
paynow.integration.key=3ebff6ba-b80a-4db5-9adb-2004d780d7c5
paynow.return-url=http://34.206.207.121:8080/api/v1/payments/return?reference={reference}
paynow.result-url=http://34.206.207.121:8080/api/v1/payments/webhook

# Vonage Configuration
# Optionally set `VONAGE_API_KEY` in environment or `vonage.api-key` here
vonage.api-key=${VONAGE_API_KEY:b85ec1d0}
# Using the provided secret key as default
vonage.api-secret=${VONAGE_API_SECRET:rSASwX6Xu0KnPiRC}
vonage.from-number=${VONAGE_FROM_NUMBER:+263781199756}


# Firebase Configuration (path to service account JSON file)
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:config/firebase-service-account.json}

# WebSocket Configuration
spring.websocket.server.handler-timeout-seconds=3600
spring.websocket.servlet.buffer-size=8192

# Production WebSocket Settings
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:none}
server.compression.enabled=true
server.compression.min-response-size=1024
