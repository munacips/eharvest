version: '3.8'

services:
  # Python AI Service
  ai-service:
    build:
      context: ./eharvest
    container_name: eharvest-ai-service
    ports:
      - "8000:8080"
    networks:
      - eharvest-network

  backend:
    build:
      context: ./eharvest
    container_name: eharvest-backend
    depends_on:
      - ai-service
      - db
    ports:
      - "8080:8080"
    environment:
      - AI_SERVICE_URL=http://ai-service:8080
    networks:
      - eharvest-network

networks:
  eharvest-network:
    driver: bridge