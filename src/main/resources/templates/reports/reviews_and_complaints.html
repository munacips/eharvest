<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title th:text="${reportTitle}">Reviews And Complaints</title><style th:utext="${reportCss}"></style></head>
<body><div class="page"><div class="header"><div class="company" th:text="${companyName}">eHarvest</div><div class="title" th:text="${reportTitle}">Reviews And Complaints</div><div class="meta">Generated by <span th:text="${generatedBy}">system</span> | Range <span th:text="${dateRange}">range</span></div></div><div class="description" th:text="${reportDescription}">Review activity and complaint indicators.</div><div class="kpis"><div class="kpi" th:each="entry : ${summary}"><div class="kpi-key" th:text="${entry.key}">metric</div><div class="kpi-value" th:text="${entry.value}">0</div></div></div><table><thead><tr><th th:each="column : ${columns}" th:text="${column.label}">Column</th></tr></thead><tbody><tr th:each="row : ${rows}"><td th:each="column : ${columns}" th:text="${row[column.key]}">Value</td></tr></tbody></table><div class="notes" th:if="${notes != null and !notes.isEmpty()}"><strong>Notes</strong><ul><li th:each="note : ${notes}" th:text="${note}">Note</li></ul></div></div></body>
</html>
